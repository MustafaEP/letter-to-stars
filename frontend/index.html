<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Letter to Stars | Dijital Günlük ve Anı Defteri</title>
    <meta
      name="description"
      content="Letter to Stars ile duygularını, anılarını ve hayallerini yıldızlara mektup gibi yaz. Güvenli, modern ve huzurlu bir dijital günlük deneyimi."
    />
    <meta name="theme-color" content="#020617" />
    <meta name="color-scheme" content="dark light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:title" content="Letter to Stars" />
    <meta
      property="og:description"
      content="Duygularını ve anılarını yıldızlara emanet edebileceğin dijital günlük uygulaması."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <style>
      :root {
        color-scheme: dark;
        background-color: #020617;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text',
          'Inter', sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 55%),
          radial-gradient(circle at bottom, rgba(244, 114, 182, 0.1), transparent 55%),
          #020617;
        color: #e5e7eb;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        min-height: 100vh;
        isolation: isolate;
      }

      .lts-no-js {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: radial-gradient(circle at top, #020617, #020617 60%, #020617);
        color: #e5e7eb;
        z-index: 50;
      }

      .lts-no-js-inner {
        max-width: 480px;
        width: 100%;
        padding: 1.5rem 1.75rem;
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 55%),
          rgba(15, 23, 42, 0.98);
        box-shadow:
          0 24px 80px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(18px);
      }

      .lts-no-js-title {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .lts-no-js-subtitle {
        margin: 0 0 1rem;
        font-size: 0.95rem;
        color: #cbd5f5;
      }

      .lts-no-js-note {
        margin: 0;
        font-size: 0.85rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="lts-no-js">
        <div class="lts-no-js-inner">
          <p class="lts-no-js-title">Letter to Stars açılmıyor gibi görünüyor.</p>
          <p class="lts-no-js-subtitle">
            Uygulamayı kullanmak için tarayıcında JavaScript'in etkin olması gerekiyor.
          </p>
          <p class="lts-no-js-note">
            Tarayıcı ayarlarından JavaScript'i açtıktan sonra bu sayfayı yenileyebilirsin.
          </p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
